<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodern Todo App </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>


    <!-- Input Section -->
    <Div class="input section">
        <input type="text" id="todo-input " placeholder="add a new task...">
         <button id="add-btn">Add</button>
    </Div>

    <!-- Bulk Actions -->
    <div class="actions">
        <button id="delete-selected">Deleted Selected</button>
    </div>

    <!-- Todo-list -->
     <ul id="todo-list"></ul>
</div>    

<script src="script.js"></script>
</body>
</html>
